name: Export hardening base tree (temporary)

on:
  push:
    branches:
      - improvements
    paths:
      - ".github/workflows/evals.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/evals.yml"

permissions:
  contents: read

jobs:
  export-tree:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: improvements
          fetch-depth: 0
          show-progress: false
      - name: Export current commit and tree
        run: |
          mkdir -p artifacts
          git rev-parse HEAD > artifacts/commit-sha.txt
          git show -s --format=%T HEAD > artifacts/tree-sha.txt
          cat artifacts/commit-sha.txt
          cat artifacts/tree-sha.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hardening-base-tree
          path: artifacts
          if-no-files-found: error
          retention-days: 14
