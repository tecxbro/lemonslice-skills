name: LemonSlice skill evaluations

on:
  push:
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "evals/**"
      - "scripts/validate_skills.py"
      - "references/implementation-contract.md"
      - ".github/workflows/evals.yml"
  pull_request:
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "evals/**"
      - "scripts/validate_skills.py"
      - "references/implementation-contract.md"
      - ".github/workflows/evals.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-skill-structure:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/validate_skills.py 2>&1 | tee artifacts/skill-structure.txt
      - name: Upload structure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: skill-structure-report
          path: artifacts/skill-structure.txt
          if-no-files-found: error

  validate-evaluation-schema:
    name: Validate evaluation schema and fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python evals/run_evals.py --validate

  test-openapi-normalizer:
    name: Unit-test OpenAPI normalization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s lemonslice-api-reference/tests -p "test_*.py" -v

  check-documentation-links:
    name: Check documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate links
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/validate_skills.py --links-only 2>&1 | tee artifacts/documentation-links.txt
      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: documentation-links-report
          path: artifacts/documentation-links.txt
          if-no-files-found: error
