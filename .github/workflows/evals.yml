name: Publish LemonSlice hardening changes (temporary)

on:
  push:
    branches:
      - improvements
    paths:
      - ".github/workflows/evals.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/evals.yml"

permissions:
  contents: write

concurrency:
  group: hardening-publication-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: improvements
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Apply reviewed files
        run: python scripts/apply_hardening_bundle.py
      - name: Exempt repository slug from skill references
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/validate_skills.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "if referenced not in known_skills:",
              'if referenced not in known_skills and referenced != "lemonslice-skills":',
          )
          path.write_text(text, encoding="utf-8")
          PY
      - name: Probe and save one stable source set
        run: |
          python lemonslice-api-reference/scripts/sync_openapi.py \
            --download-sources \
            --source-dir artifacts/sources \
            --probe-count 3 \
            --report artifacts/docs-drift.md
      - name: Generate repository snapshot from saved source
        run: |
          python lemonslice-api-reference/scripts/sync_openapi.py \
            --write-snapshot \
            --openapi-file artifacts/sources/openapi.json \
            --llms-file artifacts/sources/llms.txt \
            --source-metadata-file artifacts/sources/source-metadata.json \
            --snapshot lemonslice-api-reference/references/openapi.snapshot.json
      - name: Format and validate
        run: |
          python scripts/format_repository_data.py
          python -m unittest discover -s lemonslice-api-reference/tests -p "test_*.py" -v
          python evals/run_evals.py --validate
          python scripts/validate_skills.py
          python scripts/validate_skills.py --links-only
          python scripts/format_repository_data.py --check
      - name: Push non-workflow hardening changes
        run: |
          rm -rf artifacts
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -f scripts/apply_hardening_bundle.py
          rm -f scripts/.hardening_bundle.part*
          git restore --source=origin/improvements -- .github/workflows/docs-drift.yml .github/workflows/evals.yml
          rm -f .github/workflows/behavioral-evals.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden LemonSlice drift and evaluation infrastructure"
          git push origin HEAD:improvements
